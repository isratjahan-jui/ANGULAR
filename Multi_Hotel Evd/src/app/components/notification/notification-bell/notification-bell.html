<div class="bell-container">
  <button class="bell-btn" (click)="toggleDropdown($event)" aria-label="Notifications">
    <span class="bell-icon">🔔</span>
    <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <div class="dropdown-menu" *ngIf="showDropdown" (click)="$event.stopPropagation()">
    <div class="dropdown-header">
      <h4>Notifications</h4>
      <button class="mark-all-btn" *ngIf="unreadCount > 0" (click)="markAllAsRead()">Mark all as read</button>
    </div>

    <div class="dropdown-list">
      <div *ngIf="notifications.length === 0" class="empty-state">
        <p>No notifications yet</p>
      </div>

      <div 
        *ngFor="let note of notifications" 
        class="notification-item" 
        [class.unread]="!note.read"
        (click)="markAsRead(note, $event)">
        <div class="item-body">
          <h5 class="item-title">{{ note.title }}</h5>
          <p class="item-desc">{{ note.message }}</p>
          <span class="item-time">{{ note.createdAt | date:'short' }}</span>
        </div>
        <div class="item-status" *ngIf="!note.read">
          <span class="unread-dot"></span>
        </div>
      </div>
    </div>
  </div>
</div>
