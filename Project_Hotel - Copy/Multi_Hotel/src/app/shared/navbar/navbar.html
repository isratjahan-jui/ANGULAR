<nav class="navbar navbar-expand-lg navbar-dark sticky-top"
     style="background:#0a1628; border-bottom:1px solid rgba(201,168,76,0.25); height:64px;">
  <div class="container">

    <a class="navbar-brand" routerLink="/"
       style="font-family:'Georgia',serif; color:#c9a84c; font-size:1.55rem; font-weight:700; letter-spacing:-0.5px;">
      Stay<span style="color:white;">Sphere</span>
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto gap-1">
        <li class="nav-item">
          <a class="nav-link" routerLink="/"
             routerLinkActive="active-link"
             [routerLinkActiveOptions]="{exact:true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/hotels"
             routerLinkActive="active-link">Hotels</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/deals"
             routerLinkActive="active-link">Deals</a>
        </li>
        <li class="nav-item" *ngIf="auth.isLoggedIn()">
          <a class="nav-link" [routerLink]="auth.getDashboardPath()"
             routerLinkActive="active-link">Dashboard</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto gap-2 align-items-center">
        <ng-container *ngIf="!auth.isLoggedIn()">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login">Sign In</a>
          </li>
          <li class="nav-item">
            <a class="btn btn-sm px-3 py-1" routerLink="/register"
               style="background:#c9a84c; color:#0a1628; font-weight:600; border-radius:8px;">
              Register
            </a>
          </li>
        </ng-container>

        <ng-container *ngIf="auth.isLoggedIn()">
          <li class="nav-item me-2">
            <app-notification-bell></app-notification-bell>
          </li>
          <li class="nav-item">
            <span class="nav-link" style="color:rgba(255,255,255,0.8);">
              👤 {{ auth.getLoggedUser()?.name }}
            </span>
          </li>
          <li class="nav-item">
            <button class="btn btn-sm px-3 py-1" (click)="logout()"
                    style="border:1.5px solid #c9a84c; color:#c9a84c; background:transparent; border-radius:8px; font-weight:600;">
              Logout
            </button>
          </li>
        </ng-container>
      </ul>
    </div>
  </div>
</nav>
