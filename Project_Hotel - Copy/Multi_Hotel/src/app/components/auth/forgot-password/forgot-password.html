<div class="fp-wrap">
  <div class="fp-card">
    <a routerLink="/auth/login" class="back-link">← Back to Sign In</a>

    <div class="fp-icon">🔑</div>
    <h2>Forgot Password?</h2>
    <p class="fp-sub">Enter your email and we'll send you a reset link.</p>

    <div *ngIf="!sent">
      <div class="fg">
        <label>Email Address</label>
        <input type="email" [(ngModel)]="email" placeholder="you@email.com" />
      </div>
      <button class="auth-btn" (click)="sendReset()">Send Reset Link</button>
    </div>

    <div *ngIf="sent" class="success-msg">
      ✅ Reset link sent to <strong>{{ email }}</strong>. Check your inbox!
    </div>
  </div>
</div>
