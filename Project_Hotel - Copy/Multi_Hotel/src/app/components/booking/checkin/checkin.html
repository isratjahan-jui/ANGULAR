<app-customer-layout
  pageTitle="Today's Check-ins"
  [pageSub]="today">

  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border" style="color:#c9a84c;"></div>
  </div>

  <ng-container *ngIf="!loading">
    <div *ngIf="bookings.length === 0" class="empty-state">
      <div class="es-icon">🏨</div>
      <h3>No check-ins today</h3>
      <p>You have no bookings checking in today.</p>
      <a routerLink="/hotels" class="es-btn">Browse Hotels</a>
    </div>

    <div class="booking-cards" *ngIf="bookings.length > 0">
      <div class="checkin-card" *ngFor="let b of bookings">
        <div class="cc-emoji">{{ b.hotelEmoji }}</div>
        <div class="cc-info">
          <h4>{{ b.hotelName }}</h4>
          <p>📍 {{ b.hotelLocation }}</p>
          <div class="cc-row">
            <span>🗓 {{ b.checkIn }} → {{ b.checkOut }}</span>
            <span>👥 {{ b.guests }}</span>
            <span>🌙 {{ b.nights }} nights</span>
          </div>
        </div>
        <div class="cc-right">
          <div class="cc-price">৳{{ b.totalPrice | number }}</div>
          <span class="status-badge s-confirmed">Check-in Today</span>
          <button type="button" class="es-btn mt-2" (click)="processCheckin(b.id)">Check In Now</button>
        </div>
      </div>
    </div>
  </ng-container>
</app-customer-layout>
